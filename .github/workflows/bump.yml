name: Track upstream Supersonic releases
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest upstream version
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/dweymouth/supersonic/releases/latest | jq -r .tag_name)
          echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"

      - name: Read current version from spec
        id: current
        run: |
          CUR=$(grep -m1 '^Version:' supersonic.spec | awk '{print $2}')
          echo "version=$CUR" >> "$GITHUB_OUTPUT"

      - name: Update spec and push if different
        if: steps.upstream.outputs.version != steps.current.outputs.version
        run: |
          NEW="${{ steps.upstream.outputs.version }}"
          sed -i "s/^Version:.*/Version:        $NEW/" supersonic.spec
          sed -i "s/^Release:.*/Release:        1%{?dist}/" supersonic.spec
          DATE=$(date +"%a %b %d %Y")
          sed -i "/^%changelog/a * $DATE Release Bot <bot@users.noreply.github.com> - $NEW-1\n- Update to $NEW\n" supersonic.spec
          git config user.name "release-bot"
          git config user.email "bot@users.noreply.github.com"
          git add supersonic.spec
          git commit -m "Bump to v$NEW"
          git pus
