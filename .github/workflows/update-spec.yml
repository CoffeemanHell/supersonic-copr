name: Track upstream Supersonic releases
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Fetch latest upstream version
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/dweymouth/supersonic/releases/latest | jq -r .tag_name)
          echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"

      - name: Read current version from spec
        id: current
        run: |
          CUR=$(grep -m1 '^Version:' supersonic.spec | awk '{print $2}')
          echo "version=$CUR" >> "$GITHUB_OUTPUT"

      - name: Update spec with Python (includes Release Notes)
        if: steps.upstream.outputs.version != steps.current.outputs.version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.upstream.outputs.version }}
        shell: python
        run: |
          import json
          import urllib.request
          import re
          import os
          from datetime import datetime

          url = 'https://api.github.com/repos/dweymouth/supersonic/releases/latest'
          headers = {'User-Agent': 'Mozilla/5.0'}
          token = os.environ.get('GITHUB_TOKEN')
          if token:
              headers['Authorization'] = f'Bearer {token}'

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as response:
              data = json.loads(response.read().decode())

          upstream_ver = os.environ.get('NEW_VERSION')
          body = data.get('body', '')

          lines = body.split('\n')
          cleaned_notes = []
          for line in lines:
              line = line.strip()
              
              if not line or line.startswith('#'):
                  continue
                  
              if 'made their first contribution' in line:
                  continue

              if line.startswith('- ') or line.startswith('* ') or line.startswith('• '):
                  cleaned_line = line[2:]
              elif len(line) > 3 and not line.startswith('Go to') and not line.startswith('['):
                  cleaned_line = line
              else:
                  continue

              cleaned_line = re.sub(r'\*\*|\*', '', cleaned_line)
              
              cleaned_line = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', cleaned_line)
              
              cleaned_line = cleaned_line.strip()
              if cleaned_line:
                  cleaned_notes.append(f'- {cleaned_line}')

          if not cleaned_notes:
              cleaned_notes = [f'- New upstream release: {upstream_ver}']

          changelog_str = '\n'.join(cleaned_notes)

          date_str = datetime.now().strftime('%a %b %d %Y')
          new_entry = f'* {date_str} Release Bot <bot@users.noreply.github.com> - {upstream_ver}-1\n{changelog_str}\n'

          with open('supersonic.spec', 'r') as f:
              spec_content = f.read()

          spec_content = re.sub(r'^Version:\s+\S+', f'Version:        {upstream_ver}', spec_content, flags=re.MULTILINE)
          spec_content = re.sub(r'^Release:\s+\S+', 'Release:        1%{?dist}', spec_content, flags=re.MULTILINE)
          spec_content = spec_content.replace('%changelog\n', f'%changelog\n{new_entry}\n')

          with open('supersonic.spec', 'w') as f:
              f.write(spec_content)

      - name: Commit and Push
        if: steps.upstream.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "release-bot"
          git config user.email "bot@users.noreply.github.com"
          git add supersonic.spec
          git commit -m "Bump to v${{ steps.upstream.outputs.version }}"
          git push
