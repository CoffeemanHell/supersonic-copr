name: Check Upstream and Auto Update Spec

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import json
          import urllib.request
          import re
          import os
          from datetime import datetime

          url = 'https://api.github.com/repos/dweymouth/supersonic/releases/latest'
          headers = {'User-Agent': 'Mozilla/5.0'}
          token = os.environ.get('GITHUB_TOKEN')
          if token:
              headers['Authorization'] = f'Bearer {token}'

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as response:
              data = json.loads(response.read().decode())

          upstream_ver = data['tag_name'].lstrip('v')
          body = data.get('body', '')

          with open('supersonic.spec', 'r') as f:
              spec_content = f.read()

          current_ver = re.search(r'^Version:\s+(\S+)', spec_content, re.MULTILINE).group(1)

          print(f'Upstream Version: {upstream_ver}')
          print(f'Current Version: {current_ver}')

          if upstream_ver == current_ver:
              print('No new version. No update required.')
              if 'GITHUB_ENV' in os.environ:
                  with open(os.environ['GITHUB_ENV'], 'a') as env_f:
                      env_f.write('UPDATE_NEEDED=false\n')
              exit(0)

          lines = body.split('\n')
          cleaned_notes = []
          for line in lines:
              line = line.strip()
              if not line:
                  continue
              if line.startswith('#'):
                  continue
              
              if line.startswith('- ') or line.startswith('* ') or line.startswith('• '):
                  cleaned_line = re.sub(r'\*\*|\*', '', line[2:])
                  cleaned_notes.append(f'- {cleaned_line}')
              elif len(line) > 3 and not line.startswith('Go to') and not line.startswith('['):
                  cleaned_line = re.sub(r'\*\*|\*', '', line)
                  cleaned_notes.append(f'- {cleaned_line}')

          if not cleaned_notes:
              cleaned_notes = [f'- New upstream release: {upstream_ver}']

          changelog_str = '\n'.join(cleaned_notes)

          date_str = datetime.now().strftime('%a %b %d %Y')
          new_entry = f'* {date_str} coffeeicus <coffeelover@coffeelover.uk> - {upstream_ver}-1\n{changelog_str}\n'

          spec_content = re.sub(r'^Version:\s+\S+', f'Version:        {upstream_ver}', spec_content, flags=re.MULTILINE)
          spec_content = re.sub(r'^Release:\s+\S+', 'Release:        1%{?dist}', spec_content, flags=re.MULTILINE)
          spec_content = spec_content.replace('%changelog\n', f'%changelog\n{new_entry}\n')

          with open('supersonic.spec', 'w') as f:
              f.write(spec_content)

          if 'GITHUB_ENV' in os.environ:
              with open(os.environ['GITHUB_ENV'], 'a') as env_f:
                  env_f.write('UPDATE_NEEDED=true\n')
                  env_f.write(f'NEW_VERSION={upstream_ver}\n')

      - name: Commit and Push
        if: env.UPDATE_NEEDED == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add supersonic.spec
          git commit -m "Update spec to version ${{ env.NEW_VERSION }} with upstream release notes [skip ci]"
          git push
